<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggyvest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.cdnfonts.com/css/neue-plak" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/poppins" rel="stylesheet">
    <link rel="stylesheet" href="./piggy.css">
    <link rel="shortcut icon" href="../images/piggyvesticon-p.png" type="">
</head>
<body>
    <header>
        <nav>
            <a href=""><img src="../images/piggyvestlogo.png" alt="" class="logo"></a>

            <ul class="menu-list">
                <li><a href="">Save</a><i class="fa-solid fa-angle-down"></i></li>
                <li><a href="">Invest</a></li>
                <li><a href="">Stories</a></li>
                <li><a href="">FAQ's</a></li>
                <li><a href="">Resources</a><i class="fa-solid fa-angle-down"></i></li>
            </ul>

            <div class="btn-icons">
                <i class="fa-solid fa-bars"></i>
                <button class="create-btn"><a href="">Create free account</a></button>
                <button class="signin-btn"><a href="">Sign in</a></button>
            </div>
        </nav>
    </header>

    <!-- --HERO SECTION-- -->

    <section class="hero">


    <div class="hero-left">
   <h1>
  The better way 
  <span class="dot">
    <span><img src="../images/spin2.svg" alt="" width="40px" class="spin"></span>
  </span>
  to save and invest.
</h1>
  </div>

  <div class="hero-right">
    <p>
      Piggyvest helps over 6 million customers achieve their financial goals by helping them save and invest with ease.
    </p>

    <div class="buttons">
      <button class="iphone"><img src="../images/whiteAppleLogo.svg" alt=""><span>Get on iPhone</span></button>
      
      <button class="android"><img src="../images/google-icon.svg" alt=""> <span>Get on Android</span></button>
    </div>
  </div>

  
  

</section>

<section>
  <div class="hero-image">
    <img src="../images/piggyheroimage.png" alt="" width="100%" class="main-img">
    <img src="../images/house.png" alt="" width="400px" class="house">
    <img src="../images/interest.png" alt="" width="400px" class="interest">
    <img src="../images/trip.png" alt="" width="400px" class="trip">

  </div>
</section>


</body>
</html>
